<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>الرئيسية | شركة حميد للأدوية</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="main-nav">
        <div class="logo">شركة حميد للأدوية</div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">الرئيسية</a></li>
            <li><a href="delivery.html">التوصيل</a></li>
            <li><a href="about.html">من نحن</a></li>
            <li><a href="contact.html">تواصل معنا</a></li>
        </ul>
        <div class="cart-trigger" onclick="document.getElementById('sideCart').classList.add('open')">
            <i class="fas fa-shopping-cart"></i> (<span id="count">0</span>)
        </div>
        <a href="register.html" class="nav-link">تسجيل الدخول</a>
        <a href="#" onclick="logout()" class="nav-link">تسجيل الخروج</a>
    </nav>

    <header class="hero-section">
        <h1>شركة حميد للأدوية</h1>
        <p>أهلاً بك في صيدليتك المتكاملة - صنعاء شملان</p>
    </header>

    <div class="container"><div id="medGrid" class="medicine-grid"></div></div>

    <div id="sideCart" class="side-cart">
        <div class="cart-head"><h3>سلة المشتريات</h3><i class="fas fa-times" onclick="document.getElementById('sideCart').classList.remove('open')"></i></div>
        <div id="cartItems"></div>
        <div class="total-box">الإجمالي: <span id="total">0</span> ريال</div>
        <button class="mega-btn" onclick="window.location.href='delivery.html'">إتمام الطلب والتوصيل</button>
    </div>

    <footer class="page-footer">
        <p>&copy; 2025 شركة حميد للأدوية. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
