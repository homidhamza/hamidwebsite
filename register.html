<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | شركة حميد للأدوية</title>
    <meta name="description" content="سجل الدخول إلى حسابك على موقع شركة حميد للأدوية لإدارة طلباتك ومشترياتك.">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-info">
            <i class="fas fa-hand-holding-medical"></i>
            <h1>شركة حميد للأدوية</h1>
            <p>أهلاً بك في نظامنا المتكامل. سجل دخولك للوصول إلى استشاراتك وطلباتك الطبية في صنعاء - شملان.</p>
        </div>

        <div class="login-form-side">
            <h2>تسجيل الدخول</h2>
            <p class="note-text">يجب إنشاء حساب أولاً إذا لم يكن لديك حساب موجود.</p>
            <form onsubmit="event.preventDefault(); window.location.href='index.html'">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="ادخل البريد الإلكتروني" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="كلمة المرور" required>
                </div>
                <button type="submit" class="login-btn">دخول إلى النظام</button>
            </form>
            
            <div class="footer-links">
                <p>مستخدم جديد؟ <a href="signup.html">إنشاء حساب جديد</a></p>
                <p><a href="contact.html">تحتاج مساعدة؟ تواصل معنا</a></p>
            </div>
        </div>
    </div>

    <footer class="login-footer">
        <p>&copy; 2025 شركة حميد للأدوية</p>
    </footer>

</body>
</html>
