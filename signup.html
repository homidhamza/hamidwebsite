<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | شركة حميد للأدوية</title>
    <meta name="description" content="أنشئ حسابًا جديدًا على موقع شركة حميد للأدوية لبدء الطلبات والتوصيل بسهولة.">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-side signup-bg">
            <i class="fas fa-user-plus"></i>
            <h1>انضم إلينا</h1>
            <p>أنشئ حسابك في شركة حميد الموثوقة للأدوية - صنعاء.</p>
        </div>
        <div class="auth-form-container">
            <h2>فتح حساب جديد</h2>
            <form onsubmit="event.preventDefault(); window.location.href='register.html'">
                <input type="text" placeholder="الاسم الكامل" required>
                <input type="email" placeholder="البريد الإلكتروني" required>
                <input type="password" placeholder="كلمة المرور" required>
                <button type="submit" class="mega-btn">تأكيد التسجيل</button>
                <p>لديك حساب؟ <a href="register.html">سجل دخولك هنا</a></p>
            </form>
        </div>
    </div>

    <footer class="login-footer">
        <p>&copy; 2025 شركة حميد للأدوية</p>
    </footer>
</body>
</html>
